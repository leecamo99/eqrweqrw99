<style>
:root{--bg:#f5f0e6;--paper:#faf6ed;--ink:#2b2b2b;--muted:#7a7367;--line:#d9cfbc;--border:#c9bfae;--primary:#34495e;--accent:#a68a56;--note:#f3ead6;--side:#2c3e34;--side2:#3d5346;--danger:#9c5b5b}body.dark{--bg:#1a1f2c;--paper:#242a35;--ink:#d4c9a8;--muted:#9a9280;--line:#3a4050;--border:#3d4556;--primary:#c9bfae;--accent:#c6a86a;--note:#2a2f3c;--side:#141922;--side2:#1e2532}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.7 Georgia,"Microsoft JhengHei",serif}#app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}#side{background:var(--side);color:#e8e0cc;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}#side h2{font-size:15px;letter-spacing:2px;color:var(--accent);font-weight:400;margin:0 0 12px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:10px}.btn{display:inline-block;border:1px solid var(--border);background:transparent;color:var(--primary);padding:7px 12px;margin:3px;cursor:pointer;font:13px Georgia,"Microsoft JhengHei",serif}.btn:hover{background:var(--primary);color:var(--paper)}.sidebtn{width:100%;border:1px solid rgba(255,255,255,.22);color:#e8e0cc;background:transparent;margin:5px 0;padding:9px;cursor:pointer}.sidebtn.hi{color:var(--accent);border-color:var(--accent)}.nb{background:var(--side2);border-left:2px solid transparent;padding:10px;margin:7px 0;cursor:pointer;font-family:"Microsoft JhengHei",sans-serif}.nb.active{border-left-color:var(--accent);background:rgba(166,138,86,.15)}.nb small{color:#cfc6b2}.del{float:right;background:none;border:0;color:#d0a0a0;cursor:pointer}#sync{border:1px solid rgba(255,255,255,.15);padding:8px;margin-bottom:12px;font-size:12px}.ok{color:#8fb28f}.warn{color:#d2aa67}.err{color:#d6a0a0}#main{padding:24px 32px}h1{text-align:center;color:var(--primary);font-weight:400;letter-spacing:3px;margin:0}.sub{text-align:center;color:var(--muted);font-size:12px;font-style:italic;letter-spacing:1px;margin-bottom:18px}#upload{background:var(--paper);border:1px dashed var(--border);padding:20px;text-align:center;margin-bottom:18px}.title{color:var(--primary);letter-spacing:1px}select,input,textarea{background:var(--paper);color:var(--ink);border:1px solid var(--border);padding:7px;font-family:inherit}textarea{width:100%;min-height:140px}.bar{height:3px;background:var(--line);margin-top:10px}.bar>div{height:100%;background:var(--accent);width:0%;transition:.2s}#progress{display:none;color:var(--muted);font-size:12px}.show{display:block!important}#head{background:var(--paper);border:1px solid var(--border);padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:center}#head img{width:58px;height:58px;object-fit:cover;border:1px solid var(--border)}#head input{font-size:20px;border:0;border-bottom:1px solid var(--line);width:100%;color:var(--primary)}.card{background:var(--paper);border:1px solid var(--border);border-left:3px solid var(--primary);padding:18px;margin:16px 0;display:grid;grid-template-columns:1fr 310px;gap:18px}.card h3{grid-column:1/-1;color:var(--primary);font-weight:400;border-bottom:1px solid var(--line);margin:0;padding-bottom:8px}.card h3 input{border:0;background:transparent;color:var(--primary);font-size:17px;width:80%}.en{font-size:15px;line-height:1.9}.note{background:var(--note);border:1px solid var(--border);padding:12px;font-family:"Microsoft JhengHei",sans-serif}.note h4{font-family:Georgia,serif;letter-spacing:1px;color:var(--primary);font-weight:400;border-bottom:1px solid var(--line);margin:0 0 8px;padding-bottom:6px}.mynote{border:1px dashed var(--border);min-height:44px;padding:8px}.vocab li{cursor:pointer;margin:4px 0}.vocab small{color:var(--accent)}.mark{background:transparent!important;border-bottom:1px dotted rgba(52,73,94,.35);padding:0 2px;cursor:pointer;transition:.15s}.mark.i1{background:rgba(232,217,168,.16)!important}.mark.i2{background:rgba(232,217,168,.28)!important}.mark.i3{background:rgba(232,217,168,.42)!important}.mark.i4{background:rgba(232,217,168,.58)!important}.mark.i5{background:rgba(232,217,168,.75)!important}.mark.i6,.mark.i7{background:rgba(220,195,195,.75)!important}.mark.i8,.mark.i9,.mark.i10{background:rgba(220,195,195,.9)!important;box-shadow:inset 0 -2px rgba(156,91,91,.45)}#dock,#capture{position:fixed;z-index:30;background:var(--paper);border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.15);display:none;max-height:70vh;overflow:auto}#dock{right:18px;bottom:18px;width:min(390px,calc(100vw - 36px))}#capture{left:18px;bottom:18px;width:min(340px,calc(100vw - 36px))}#dock header,#capture header{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:10px 12px;color:var(--primary);letter-spacing:1px}#dock .body,#capture .body{padding:12px;font-family:"Microsoft JhengHei",sans-serif}.wordbig{font-size:25px;color:var(--primary);font-weight:700}.meaning{color:var(--accent);font-size:16px;margin:8px 0}.capitem{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dotted var(--line);padding:6px;cursor:pointer}.capitem:hover{background:rgba(166,138,86,.09)}#flash{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;align-items:center;justify-content:center;padding:18px}#flash .box{background:var(--paper);border:1px solid var(--border);padding:22px;width:min(520px,96vw)}#flashQ{font-size:30px;color:var(--primary)}#flashA{display:none;background:var(--note);border-left:3px solid var(--accent);padding:12px;margin:12px 0}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:center;justify-content:center;padding:18px}.modal .box{background:var(--paper);border:1px solid var(--border);padding:20px;width:min(520px,96vw);max-height:90vh;overflow:auto}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.menu{display:none;position:fixed;top:12px;left:12px;z-index:80;background:var(--paper);border:1px solid var(--border);color:var(--primary);padding:8px}@media(max-width:820px){#app{grid-template-columns:1fr}.menu{display:block}#side{position:fixed;transform:translateX(-105%);transition:.2s;width:82%;max-width:300px;box-shadow:2px 0 12px rgba(0,0,0,.3)}#side.open{transform:none}#main{padding:58px 14px 24px}.card{grid-template-columns:1fr}h1{font-size:22px}.grid{grid-template-columns:1fr}}
</style>

<button class="menu" onclick="document.getElementById('side').classList.toggle('open')">☰</button><div id="app"><aside id="side"><h2>MY NOTEBOOKS</h2><div id="sync"><div id="syncText" class="warn">尚未設定雲端同步</div><button class="sidebtn" onclick="openSync()">設定</button><button class="sidebtn" onclick="cloudUpload(true)">上傳</button><button class="sidebtn" onclick="cloudDownload(true)">載入</button></div><div id="nblist"></div><hr><button class="sidebtn hi" onclick="openPaste()">貼上文字建立</button><button class="sidebtn hi" onclick="toggleCapture()">捕獲單字區</button><button class="sidebtn" onclick="startFlash(true)">開始閃卡複習</button><button class="sidebtn" onclick="createBlank()">新增空白</button><button class="sidebtn" onclick="exportAll()">匯出全部</button><button class="sidebtn" onclick="document.getElementById('importFile').click()">匯入</button><input id="importFile" type="file" accept=".json" style="display:none" onchange="importAll(event)"><button class="sidebtn" onclick="toggleDark()">切換深色</button><button class="sidebtn" onclick="resetAll()">清空本機</button></aside><main id="main"><h1>English Notebook</h1><div class="sub">— OCR · Vocabulary · Flashcards · GitHub Sync —</div><section id="upload"><div class="title">Upload · Capture · Learn</div><div style="margin-top:8px">OCR 語言 <select id="ocrLang"><option value="eng">English</option><option value="eng+chi_tra">English + 繁中</option><option value="chi_tra">繁中</option></select></div><div style="font-size:12px;color:var(--muted);margin:8px"><label><input type="checkbox" id="prepGray" checked>灰階</label> <label><input type="checkbox" id="prepContrast" checked>增強對比</label> <label><input type="checkbox" id="prepBinary">二值化</label></div><button class="btn" onclick="document.getElementById('fileIn').click()">選檔 OCR</button><button class="btn" onclick="openPaste()">貼上文字</button><input id="fileIn" type="file" accept="image/*" multiple style="display:none" onchange="handleFiles(event.target.files)"><div id="progress"><div class="bar"><div id="pbar"></div></div><span id="progressText">preparing...</span></div></section><div id="view"></div></main></div><div id="dock"><header><span>WORD NOTE</span><button onclick="dock.classList.remove('show')">×</button></header><div class="body" id="dockBody"></div></div><div id="capture"><header><span>捕獲不懂的單字</span><button onclick="capture.classList.remove('show')">×</button></header><div class="body" id="capBody"></div></div><div id="flash"><div class="box"><div id="flashQ"></div><div id="flashMeta"></div><div id="flashA"></div><button class="btn" onclick="flashA.classList.add('show')">看答案</button><button class="btn" onclick="flashHard()">還不熟</button><button class="btn" onclick="flashKnown()">已熟，歸零</button><button class="btn" onclick="flash.classList.remove('show')">稍後</button></div></div><div class="modal" id="pasteModal"><div class="box"><h3>貼上文字建立筆記本</h3><label>筆記本名稱</label><input id="pname" style="width:100%"><label>內容</label><textarea id="pasteText"></textarea><button class="btn" onclick="createFromPaste()">建立</button><button class="btn" onclick="pasteModal.classList.remove('show')">取消</button></div></div><div class="modal" id="syncModal"><div class="box"><h3>GitHub 自動同步設定</h3><p style="font-size:12px;color:var(--muted)">Token 只存在此瀏覽器 localStorage；請只在自己的裝置使用。</p><label>Token</label><input id="sToken" type="password" style="width:100%"><div class="grid"><div><label>Owner</label><input id="sOwner" value="leecamo99" style="width:100%"></div><div><label>Repo</label><input id="sRepo" value="eqrweqrw99" style="width:100%"></div></div><div class="grid"><div><label>Branch</label><input id="sBranch" value="main" style="width:100%"></div><div><label>Path</label><input id="sPath" value="backup/latest.json" style="width:100%"></div></div><label>頻率</label><select id="sInterval"><option value="0">手動</option><option value="5">5 分鐘</option><option value="10" selected>10 分鐘</option><option value="30">30 分鐘</option></select><p><label><input id="sAutoLoad" type="checkbox" checked> 開啟時自動載入</label> <label><input id="sDaily" type="checkbox" checked> 每日快照</label></p><button class="btn" onclick="saveSync()">儲存並測試</button><button class="btn" onclick="clearSync()">清除 Token</button><button class="btn" onclick="syncModal.classList.remove('show')">取消</button></div></div>
<script>
const STORE='notebook_platform_v3',SYNC='notebook_sync_v3';let db,cur=null,dirty=false,stimer=null,dtimer=null,lastSync=0,flashQueue=[],flashCurrent=null;const REVIEW_MS=10*60*1000,DEFAULT_DUE=60*60*1000;const MEAN={security:['n.','安全；保全','security vendor = 保全廠商'],vendor:['n.','供應商；廠商','security vendor = 保全廠商'],personnel:['n.','人員','vendor personnel = 廠商人員'],support:['n./v.','支援；支援團隊','support team = 支援團隊'],team:['n.','團隊',''],teams:['n.','團隊',''],coordinates:['v.','協調；安排','coordinate 的第三人稱單數'],coordinate:['v.','協調；安排',''],addition:['n.','新增；增加','addition of permissions = 權限新增'],deletion:['n.','刪除','deletion of permissions = 權限刪除'],necessary:['adj.','必要的','as necessary = 視需要'],position:['n.','職位；位置','new position = 新職位'],working:['v./adj.','合作；運作中的','working with = 與…合作'],technology:['n.','技術；科技','technology support team'],employee:['n.','員工',''],transition:['n./v.','轉換；交接；異動','employee transition process = 員工異動流程'],processes:['n.','流程；程序','process 的複數'],obtain:['v.','取得；獲得','obtain access = 取得權限'],systems:['n.','系統','system 的複數'],ensure:['v.','確保','ensure + 子句'],correctly:['adv.','正確地','set up correctly = 正確設定'],questions:['n.','問題',''],corrections:['n.','修正；更正','make corrections = 進行修正'],email:['n./v.','電子郵件；寄信',''],badge:['n.','識別證；工作證','temporary badge = 臨時識別證'],temporary:['adj.','臨時的；暫時的',''],visible:['adj.','可見的','keep it visible'],return:['v.','歸還；返回',''],leaving:['v.','離開','before + V-ing'],approved:['adj./v.','已核准；批准',''],permission:['n.','權限；許可',''],permissions:['n.','權限；許可',''],specific:['adj.','具體的；明確的',''],explain:['v.','說明；解釋',''],state:['v.','陳述；告知',''],photography:['n.','攝影；拍照',''],includes:['v.','包含',''],including:['prep.','包括',''],recording:['n./v.','錄製；記錄',''],escort:['n./v.','陪同；陪同員','escort policy = 陪同政策'],escorted:['adj./v.','被陪同的',''],supervision:['n.','監督','direct supervision = 直接監督'],assigned:['adj.','被指派的',''],instructions:['n.','指示；說明',''],access:['n./v.','權限；存取；進入',''],facility:['n.','設施；場館',''],swipe:['v./n.','刷卡','swipe your badge'],flashes:['v.','閃爍',''],proceed:['v.','前進；繼續',''],unless:['conj.','除非',''],process:['n.','流程；程序',''],emergency:['n.','緊急狀況',''],exists:['v.','存在；發生',''],applicable:['adj.','適用的','if applicable'],individual:['n.','個人；人員',''],individuals:['n.','人員；個人',''],expires:['v.','到期；失效',''],expiration:['n.','到期；有效期限',''],encounter:['v.','遇到；遭遇',''],issues:['n.','問題；狀況',''],section:['n.','章節；段落',''],patrolling:['n./v.','巡邏',''],DBD:['abbr.','資料承載裝置','Data Bearing Device'],DBDs:['abbr.','資料承載裝置','Data Bearing Devices'],MDF:['abbr.','主配線架','Main Distribution Frame'],MDFs:['abbr.','主配線架',''],ITPAC:['abbr.','資訊技術預組裝設備',''],ITPACs:['abbr.','資訊技術預組裝設備',''],AZ:['abbr.','可用區','Availability Zone'],USB:['abbr.','USB',''],DCAT:['abbr.','DCAT 權限/訪客進出申請','依你文章情境理解'],'personal items':['n.','個人物品',''],'allowed in':['phr.','被允許進入','be allowed in + 地點'],'such as':['phr.','例如',''],'data halls':['n.','資料機房',''],'availability zones':['n.','可用區',''],'secure storage':['n.','安全儲存區',''],'high value asset':['n.','高價值資產',''],'staging areas':['n.','整備區；暫存區',''],'permission levels':['n.','權限等級',''],'not permitted to':['phr.','不被允許做…',''],'live streaming':['n.','直播串流',''],'still images':['n.','靜態影像',''],'mobile equipment':['n.','行動設備',''],'refer to':['phr.','參照；參閱',''],'on foot':['phr.','徒步',''],'production environment':['n.','生產環境；正式營運區域',''],'door policy':['n.','門禁政策',''],'one swipe one entry':['phr.','一刷一進',''],'wait for':['phr.','等待…',''],'card reader':['n.','讀卡機',''],'in accordance with':['phr.','依照；按照',''],'emergency exit door':['n.','緊急出口門',''],'at all times':['phr.','隨時；任何時候',''],'security office':['n.','警衛室；保全辦公室','']};const PHRASES=['in accordance with','not permitted to','one swipe one entry','personal items','allowed in','such as','data halls','availability zones','secure storage','high value asset','staging areas','permission levels','live streaming','still images','mobile equipment','refer to','on foot','production environment','door policy','wait for','card reader','emergency exit door','at all times','security office'];const STOP=new Set('a an the and or of to in on at is are was were be been being do does did have has had you your it its this that these those for with by from as if then must may can will not no yes we our they their he she his her him them i me my before after all any this that here'.split(' '));let sync={token:'',owner:'leecamo99',repo:'eqrweqrw99',branch:'main',path:'backup/latest.json',interval:10,autoLoad:true,daily:true};function esc(s){return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]))}function norm(){db=db||{};db.notebooks=db.notebooks||[];db.learn=db.learn||{};db.dark=!!db.dark;db.updatedAt=db.updatedAt||Date.now()}function load(){try{db=JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){db={}}norm();Object.assign(sync,JSON.parse(localStorage.getItem(SYNC)||'{}'));if(db.dark)document.body.classList.add('dark')}function save(){norm();db.updatedAt=Date.now();localStorage.setItem(STORE,JSON.stringify(db));dirty=true;render();syncText();if(sync.token&&sync.interval>0){clearTimeout(dtimer);dtimer=setTimeout(()=>cloudUpload(false),30000)}}function meaning(w){let k=w.trim(),lk=k.toLowerCase();if(MEAN[k])return MEAN[k];for(let[a,v]of Object.entries(MEAN))if(a.toLowerCase()==lk)return v;let forms=[];if(lk.endsWith('ies'))forms.push(lk.slice(0,-3)+'y');if(lk.endsWith('ing'))forms.push(lk.slice(0,-3),lk.slice(0,-3)+'e');if(lk.endsWith('ed'))forms.push(lk.slice(0,-2),lk.slice(0,-1));if(lk.endsWith('s'))forms.push(lk.slice(0,-1));for(let f of forms)for(let[a,v]of Object.entries(MEAN))if(a.toLowerCase()==f)return v;return ['','（未建字義，請自行補充）','']}function ensureLearn(w){norm();w=w.trim();if(!db.learn[w]){let m=meaning(w);db.learn[w]={word:w,pos:m[0],tw:m[1],tip:m[2],clicks:0,strength:0,captured:false,known:false,dueAt:0,updatedAt:Date.now()}}return db.learn[w]}function clickWord(w){let x=ensureLearn(w);x.clicks++;x.strength=Math.min(10,x.strength+1);x.captured=true;x.known=false;if(!x.dueAt)x.dueAt=Date.now()+DEFAULT_DUE;x.updatedAt=Date.now();localStorage.setItem(STORE,JSON.stringify(db));showWord(w);applyIntensity();renderCapture();dirty=true;syncText()}function known(w){let x=ensureLearn(w);x.clicks=0;x.strength=0;x.captured=false;x.known=true;x.dueAt=0;x.updatedAt=Date.now();save();showWord(w)}function hard(w){let x=ensureLearn(w);x.clicks+=2;x.strength=Math.min(10,x.strength+2);x.captured=true;x.known=false;x.dueAt=Date.now()+30*60*1000;save()}function markText(t,nb){t=t.replace(/\{\{|\}\}/g,'');for(let p of PHRASES){let re=new RegExp('\\b'+p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi');t=t.replace(re,m=>{addMark(nb,m,'c2');return '{{'+m+'}}'})}t=t.replace(/\b[A-Z]{2,}s?\b/g,m=>{if(t.includes('{{'+m+'}}'))return m;addMark(nb,m,'c3');return '{{'+m+'}}'});t=t.replace(/\b[a-zA-Z]{6,}\b/g,m=>{if(t.includes('{{'+m+'}}')||STOP.has(m.toLowerCase()))return m;addMark(nb,m,'c1');return '{{'+m+'}}'});return t}function addMark(nb,k,c){if(!nb.marks[k]){let m=meaning(k);nb.marks[k]={pos:m[0],tw:m[1],tip:m[2],color:c}}}function render(){norm();renderSide();renderView();setTimeout(()=>{applyIntensity();renderCapture()},0)}function renderSide(){nblist.innerHTML=db.notebooks.length?db.notebooks.map(n=>`<div class="nb ${n.id==cur?'active':''}" onclick="cur='${n.id}';render()"><button class="del" onclick="event.stopPropagation();delNB('${n.id}')">×</button><b>${esc(n.name)}</b><br><small>${n.date} · ${n.cards.length} 段 · ${Object.values(db.learn).filter(x=>x.captured&&!x.known).length} 捕獲</small></div>`).join(''):'<p style="font-size:12px;color:#bfb5a0">尚無筆記本</p>'}function renderView(){let nb=db.notebooks.find(x=>x.id==cur);if(!nb){view.innerHTML='<div style="text-align:center;color:var(--muted);padding:60px">開始 OCR、貼上文字或新增空白筆記</div>';return}view.innerHTML=`<div id="head">${nb.thumb?`<img src="${nb.thumb}">`:''}<input value="${esc(nb.name)}" onchange="nbName('${nb.id}',this.value)"></div><div>${nb.cards.map(c=>cardHTML(nb,c)).join('')}<button class="btn" <script>

(function(){

  ]);
  const IRREGULAR = {

    does:'do', did:'do', done:'do', doing:'do',
    went:'go', gone:'go', going:'go',
    made:'make', making:'make',
    took:'take', taken:'take', taking:'take',
    gave:'give', given:'give', giving:'give',

      if(!tw || tw.toLowerCase()===key.toLowerCase()) tw='（查不到翻譯，請稍後補充）';
      tip = tip || 'Auto translated by MyMemory';
    }catch(e){
      tw='（翻譯 API 暫時失敗）'; tip='MyMemory API error';
    }
    try{
      if(!pos || !tip || tip==='Auto translated by MyMemory'){
        const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(key));
        if(r.ok){
          const jd=await r.json();
          const m=jd&&jd[0]&&jd[0].meanings&&jd[0].meanings[0];
          if(m){ pos=pos||m.partOfSpeech||''; const def=m.definitions&&m.definitions[0]&&m.definitions[0].definition; if(def) tip=(tip?tip+'｜':'')+def; }
        }
      }
    }catch(e){}
    const db2=getDB();
    if(db2.learn[key]){db2.learn[key].tw=tw; db2.learn[key].pos=pos; db2.learn[key].tip=tip; db2.learn[key].loading=false; db2.learn[key].auto=true; db2.learn[key].updatedAt=Date.now(); setDB(db2);}
    if(typeof window.renderCapture==='function') try{window.renderCapture()}catch(e){}
    if(typeof window.applyIntensity==='function') try{window.applyIntensity()}catch(e){}
    showWordPatched(key);
    if(typeof window.save==='function') try{window.save()}catch(e){}
  }
  function showWordPatched(surfaceOrLemma){
    const info=lemmatize(surfaceOrLemma);
    const db=getDB();
    const x=db.learn[info.lemma] || db.learn[surfaceOrLemma];
    if(!x) return;
    const variants=Object.entries(x.variants||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>esc(k)+' ×'+v).join(', ');
    if(!document.getElementById('dockBody')) return;
    dockBody.innerHTML=`<div class="wordbig">${esc(x.lastSurface||surfaceOrLemma)}</div><div style="color:var(--muted)">原形：<b>${esc(x.lemma||x.word)}</b> · ${esc(x.pos||'')} · 點擊 ${x.clicks||0} 次 · 亮度 ${x.strength||0}/10</div><div style="color:var(--muted)">型態：${esc(x.lastForm||'base form')}</div><div class="meaning">${esc(x.tw||'')}</div><div style="color:var(--muted)">${esc(x.tip||'')}</div><div style="font-size:12px;color:var(--muted);margin-top:6px">變形：${variants||'—'}</div><button class="btn" onclick="known('${esc(x.lemma||x.word)}')">已熟，歸零</button><button class="btn" onclick="hard('${esc(x.lemma||x.word)}')">還不熟</button><button class="btn" onclick="dock.classList.remove('show')">關閉</button>`;
    dock.classList.add('show');
  }
  const oldClick=window.clickWord;
  window.clickWord=function(surface){
    const {x,info,key}=ensureLemma(surface);
    x.clicks=(x.clicks||0)+1; x.strength=Math.min(10,(x.strength||0)+1); x.captured=true; x.known=false; if(!x.dueAt)x.dueAt=Date.now()+FORM_DELAY; x.updatedAt=Date.now();
    const db=getDB(); db.learn[key]=x; setDB(db);
    showWordPatched(key);
    if(typeof window.applyIntensity==='function') try{window.applyIntensity()}catch(e){}
    if(typeof window.renderCapture==='function') try{window.renderCapture()}catch(e){}
    if(!x.tw || String(x.tw).includes('未建') || String(x.tw).includes('查詢中')) autoTranslateLemma(key);
    if(typeof window.save==='function') try{window.save()}catch(e){}
  };
  const oldEnsure=window.ensureLearn;
  window.ensureLearn=function(surface){return ensureLemma(surface).x;};
  const oldShow=window.showWord;
  window.showWord=function(surface){showWordPatched(surface);};
  const oldKnown=window.known;
  window.known=function(surface){const key=lemmatize(surface).lemma;const db=getDB();if(db.learn[key]){db.learn[key].clicks=0;db.learn[key].strength=0;db.learn[key].captured=false;db.learn[key].known=true;db.learn[key].dueAt=0;db.learn[key].updatedAt=Date.now();setDB(db);}if(typeof window.applyIntensity==='function')try{window.applyIntensity()}catch(e){};if(typeof window.renderCapture==='function')try{window.renderCapture()}catch(e){};showWordPatched(key);if(typeof window.save==='function')try{window.save()}catch(e){}};
  const oldHard=window.hard;
  window.hard=function(surface){const key=lemmatize(surface).lemma;const db=getDB();if(!db.learn[key]) ensureLemma(surface);const d=getDB();const x=d.learn[key];x.clicks=(x.clicks||0)+2;x.strength=Math.min(10,(x.strength||0)+2);x.captured=true;x.known=false;x.dueAt=Date.now()+30*60*1000;x.updatedAt=Date.now();setDB(d);showWordPatched(key);if(typeof window.renderCapture==='function')try{window.renderCapture()}catch(e){};if(typeof window.save==='function')try{window.save()}catch(e){}};
  const oldApply=window.applyIntensity;
  window.applyIntensity=function(){const db=getDB();document.querySelectorAll('.mark').forEach(e=>{const key=lemmatize(e.dataset.key||e.textContent).lemma;const w=db.learn[key];for(let i=1;i<=10;i++)e.classList.remove('i'+i);if(w)e.classList.add('i'+Math.min(10,w.strength||0));});};
  const oldCapture=window.renderCapture;
  window.renderCapture=function(){const db=getDB();const arr=Object.values(db.learn||{}).filter(x=>x.captured&&!x.known).sort((a,b)=>(b.clicks||0)-(a.clicks||0));if(!document.getElementById('capBody'))return;capBody.innerHTML=arr.length?arr.map(x=>`<div class="capitem" data-cap="${esc(x.lemma||x.word)}"><span>${esc(x.lemma||x.word)}<br><small>${esc(x.tw||'')}</small></span><b>${x.clicks||0}</b></div>`).join(''):'<p style="color:var(--muted)">目前沒有捕獲單字。</p>';};
  window.lemmatizeWord=lemmatize;
  window.autoTranslateLemma=autoTranslateLemma;
  setTimeout(()=>{try{window.applyIntensity();window.renderCapture();console.log('Lemma Smart Capture patch loaded');}catch(e){console.warn(e)}},500);
})();
</script>
